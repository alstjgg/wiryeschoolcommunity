# 위례인생학교 데이터 스키마
# 버전: 1.0
# 최종 수정: 2026-01-27
# 용도: 데이터 구조 정의, 코드 참조

---

# ============================================
# 설정 (Configuration)
# ============================================

config:
  default_tuition_fee: 20000        # 기본 수강료 (원)
  membership_fee: 10000             # 신규 가입비 (원)
  annual_membership_fee: 120000     # 연회원비 (원)
  refund_deadline_days: 7           # 개강 후 환불 가능 일수
  semesters_per_year: 4             # 연간 학기 수

  semester_start_months:
    - 1   # 1학기: 1월
    - 4   # 2학기: 4월
    - 7   # 3학기: 7월
    - 10  # 4학기: 10월

# ============================================
# 테이블 스키마
# ============================================

tables:

  # ------------------------------------------
  # 회원 마스터 테이블
  # ------------------------------------------
  members:
    description: "회원 정보 마스터 테이블"
    primary_key: member_id
    
    columns:
      member_id:
        type: string
        description: "회원 고유 ID"
        required: true
        
      name:
        type: string
        description: "회원 이름"
        required: true
        
      phone:
        type: string
        description: "연락처"
        required: false
        format: "010-XXXX-XXXX"
        
      email:
        type: string
        description: "이메일"
        required: false
        
      membership_type:
        type: enum
        description: "회원 유형"
        required: true
        values:
          - general     # 일반회원
          - annual      # 연회원
          
      annual_membership_start:
        type: date
        description: "연회원 시작일 (연회원인 경우)"
        required: false
        format: "YYYY-MM-DD"
        
      annual_membership_end:
        type: date
        description: "연회원 종료일 (연회원인 경우)"
        required: false
        format: "YYYY-MM-DD"
        
      join_date:
        type: date
        description: "가입일"
        required: true
        format: "YYYY-MM-DD"
        
      is_new:
        type: boolean
        description: "신규 가입 여부 (해당 학기)"
        required: true
        
      total_cancellations:
        type: integer
        description: "총 취소 횟수 (블랙리스트 참고용)"
        required: false
        default: 0
        
      notes:
        type: string
        description: "비고 (민원 이력 등)"
        required: false

  # ------------------------------------------
  # 수강신청현황 테이블
  # ------------------------------------------
  enrollments:
    description: "학기별 수강신청 현황 (로그성 테이블)"
    primary_key: enrollment_id
    
    columns:
      enrollment_id:
        type: string
        description: "신청 고유 ID"
        required: true
        
      year:
        type: integer
        description: "연도"
        required: true
        example: 2026
        
      semester:
        type: integer
        description: "학기 (1-4)"
        required: true
        values: [1, 2, 3, 4]
        
      member_id:
        type: string
        description: "회원 ID (FK: members.member_id)"
        required: true
        
      member_name:
        type: string
        description: "회원 이름 (조회 편의용)"
        required: true
        
      course_name:
        type: string
        description: "신청 과목명"
        required: true
        
      application_date:
        type: datetime
        description: "신청 일시"
        required: true
        format: "YYYY-MM-DD HH:MM:SS"
        
      tuition_fee:
        type: integer
        description: "수강료"
        required: true
        
      payment_status:
        type: enum
        description: "입금 상태"
        required: true
        values:
          - pending           # 대기 (미확인)
          - confirmed         # 등록완료 (✅)
          - needs_review      # 확인필요 (🔶)
          - name_mismatch     # 이름불일치 (⚠️)
          - not_paid          # 미입금 (❌)
          - duplicate         # 중복입금 (🔄)
          
      payment_amount:
        type: integer
        description: "입금 금액"
        required: false
        
      payment_date:
        type: datetime
        description: "입금 일시"
        required: false
        format: "YYYY-MM-DD HH:MM:SS"
        
      registration_status:
        type: enum
        description: "등록 상태 (배움숲 연동용)"
        required: true
        values:
          - applied           # 신청
          - registered        # 등록
          - cancelled         # 취소
          - refunded          # 환불
          
      notes:
        type: string
        description: "비고"
        required: false

  # ------------------------------------------
  # 입금내역 테이블
  # ------------------------------------------
  payments:
    description: "은행 입금 내역 (은행 엑셀에서 import)"
    primary_key: payment_id
    
    columns:
      payment_id:
        type: string
        description: "입금 고유 ID"
        required: true
        
      transaction_date:
        type: datetime
        description: "거래 일시"
        required: true
        format: "YYYY-MM-DD HH:MM:SS"
        
      deposit_amount:
        type: integer
        description: "입금액"
        required: true
        
      withdrawal_amount:
        type: integer
        description: "출금액"
        required: false
        default: 0
        
      balance:
        type: integer
        description: "잔액"
        required: false
        
      description:
        type: string
        description: "거래 내용 (입금자명/메모)"
        required: true
        example: "경제해설_홍길동"
        
      matched_enrollment_id:
        type: string
        description: "매칭된 수강신청 ID"
        required: false
        
      match_status:
        type: enum
        description: "매칭 상태"
        required: false
        values:
          - matched           # 정상 매칭
          - estimated         # 금액 기반 추정
          - unmatched         # 미매칭
          - duplicate         # 중복

  # ------------------------------------------
  # 과목 정보 테이블
  # ------------------------------------------
  courses:
    description: "학기별 개설 과목 정보"
    primary_key: course_id
    
    columns:
      course_id:
        type: string
        description: "과목 고유 ID"
        required: true
        
      year:
        type: integer
        description: "연도"
        required: true
        
      semester:
        type: integer
        description: "학기 (1-4)"
        required: true
        
      course_name:
        type: string
        description: "과목명"
        required: true
        example: "경제해설(심화)"
        
      instructor_name:
        type: string
        description: "강사명"
        required: true
        
      tuition_fee:
        type: integer
        description: "수강료"
        required: true
        default: 20000
        
      max_capacity:
        type: integer
        description: "정원"
        required: false
        
      day_of_week:
        type: string
        description: "수업 요일"
        required: false
        values: ["월", "화", "수", "목", "금", "토", "일"]
        
      start_date:
        type: date
        description: "개강일"
        required: false
        format: "YYYY-MM-DD"

  # ------------------------------------------
  # 출석부 테이블
  # ------------------------------------------
  attendance:
    description: "출석 기록"
    primary_key: attendance_id
    
    columns:
      attendance_id:
        type: string
        description: "출석 기록 ID"
        required: true
        
      year:
        type: integer
        description: "연도"
        required: true
        
      semester:
        type: integer
        description: "학기"
        required: true
        
      course_id:
        type: string
        description: "과목 ID"
        required: true
        
      class_date:
        type: date
        description: "수업 일자"
        required: true
        format: "YYYY-MM-DD"
        
      member_id:
        type: string
        description: "회원 ID"
        required: true
        
      status:
        type: enum
        description: "출석 상태"
        required: true
        values:
          - present           # 출석
          - absent            # 결석
          - late              # 지각
          - excused           # 사유결석

# ============================================
# 파일 명명 규칙
# ============================================

file_naming:
  
  bank_statement:
    pattern: "{YYYY}_{MM}_{DD}_입금내역.xlsx"
    example: "2026_01_15_입금내역.xlsx"
    location: "입금내역/"
    
  enrollment_management:
    pattern: "{YYYY}_{N}학기_수강관리.xlsx"
    example: "2026_1학기_수강관리.xlsx"
    location: "수강관리/"
    
  course_plan:
    pattern: "{과목명}_{강사명}_계획서.hwp"
    example: "경제해설_홍길동_계획서.hwp"
    location: "강의계획서/{YYYY}_{N}학기/초안/"
    
  course_plan_reviewed:
    pattern: "{과목명}_검토완료.docx"
    example: "경제해설_검토완료.docx"
    location: "강의계획서/{YYYY}_{N}학기/검토완료/"
    
  attendance_sheet:
    pattern: "{과목명}_출석부.xlsx"
    example: "경제해설_출석부.xlsx"
    location: "출석부/{YYYY}_{N}학기/"
    
  semester_report:
    pattern: "{YYYY}_{N}학기_운영보고서.xlsx"
    example: "2026_1학기_운영보고서.xlsx"
    location: "보고서/"
    
  annual_report:
    pattern: "{YYYY}_연간_운영보고서.xlsx"
    example: "2026_연간_운영보고서.xlsx"
    location: "보고서/"

# ============================================
# Google Drive 폴더 구조
# ============================================

folder_structure:
  root: "위례인생학교"
  
  children:
    - name: "강의계획서"
      children:
        - pattern: "{YYYY}_{N}학기"
          children:
            - name: "초안"
            - name: "검토완료"
            
    - name: "입금내역"
    
    - name: "수강관리"
    
    - name: "출석부"
      children:
        - pattern: "{YYYY}_{N}학기"
        
    - name: "보고서"
    
    - name: "설정"
      description: "과목정보, 강사정보 등 마스터 데이터"

# ============================================
# 입금 상태 이모지 매핑
# ============================================

status_emoji:
  confirmed: "✅"
  needs_review: "🔶"
  name_mismatch: "⚠️"
  not_paid: "❌"
  duplicate: "🔄"
